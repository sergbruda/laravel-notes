networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  portainer-data:
  prometheus_data:
  grafana_data:

services:
  web_nginx:
    image: nginx:alpine
    container_name: web_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    networks:
      - app-network

  web_php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: web_php
    restart: unless-stopped
    volumes:
      - ./src/app:/var/www/html
    networks:
      - app-network

  web_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: web_worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src/app:/var/www/html
    command: php artisan queue:work
    networks:
      - app-network
    depends_on:
      - web_db
      - redis

  web_db:
    image: mariadb:10.11
    container_name: web_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: my_database
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_password_123
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    user: "root"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  web_adminer:
    image: adminer:latest
    container_name: web_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - app-network

  web_portainer:
    image: portainer/portainer-ce:latest
    container_name: web_portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - app-network

  web_fail2ban:
    image: crazymax/fail2ban:latest
    container_name: web_fail2ban
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./fail2ban/data/etc/fail2ban:/etc/fail2ban
      - ./logs/nginx:/var/log/nginx:ro
      - /var/run/docker.sock:/var/run/docker.sock

  # --- НОВОЕ: МОНИТОРИНГ ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - app-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - app-network

  web_vk_bot:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: web_vk_bot
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src/app:/var/www/html
    command: php artisan vk:run
    networks:
      - app-network
    depends_on:
      - web_db
